  <script>
    // Simple storage using localStorage
    window.storage = {
      get: (key) => {
        const v = localStorage.getItem(key);
        return v ? { value: v } : null;
      },
      set: (key, value) => {
        localStorage.setItem(key, value);
        return { value };
      },
      delete: (key) => {
        localStorage.removeItem(key);
        return { deleted: true };
      }
    };

function App() {
  const [page,setPage]=useState('dashboard');
  const [loaded,setLoaded]=useState(false);
  const [sales,setSales]=useState([]);
  const [clients,setClients]=useState([]);
  const [reservations,setReservations]=useState([]);
  const [staff,setStaff]=useState([]);
  const [timecards,setTimecards]=useState({});
  const [clock,setClock]=useState(new Date());

  useEffect(()=>{
    setSales(load('s2:sales')||DEMO_SALES);
    setClients(load('s2:clients')||DEMO_CLIENTS);
    setReservations(load('s2:reservations')||DEMO_RESERVATIONS);
    setStaff(load('s2:staff')||DEMO_STAFF);
    setTimecards(load('s2:timecards')||{});
    setLoaded(true);
  },[]);

  useEffect(()=>{if(loaded)save('s2:sales',sales);},[sales,loaded]);
  useEffect(()=>{if(loaded)save('s2:clients',clients);},[clients,loaded]);
  useEffect(()=>{if(loaded)save('s2:reservations',reservations);},[reservations,loaded]);
  useEffect(()=>{if(loaded)save('s2:staff',staff);},[staff,loaded]);
  useEffect(()=>{if(loaded)save('s2:timecards',timecards);},[timecards,loaded]);
  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t);},[]);

  if(!loaded) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#7A726A'}},'読み込み中…');

  const nav=[{id:'dashboard',icon:'◈',label:'ダッシュボード'},{id:'sales',icon:'¥',label:'売上・収入'},{id:'clients',icon:'♡',label:'お客様カルテ'},{id:'reservations',icon:'◷',label:'予約管理'},{id:'timecard',icon:'⏱',label:'タイムカード'}];

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <aside className="sidebar">
          <div className="sidebar-logo"><h1>CellClubSpa</h1><p>管理システム</p></div>
          <nav className="nav">

}

function Dashboard({sales,clients,reservations,staff,timecards,clock,setPage}){
  const td=todayStr(),month=td.slice(0,7);
  const monthSales=sales.filter(s=>s.date.startsWith(month));
  const total=monthSales.reduce((a,b)=>a+Number(b.amount),0);
  const todayRes=reservations.filter(r=>r.date===td&&r.status!=='キャンセル').sort((a,b)=>a.time.localeCompare(b.time));
  const clockedIn=staff.filter(s=>{const cards=(timecards[s.id]||[]).filter(c=>c.date===td);const last=cards[cards.length-1];return last&&last.punchIn&&!last.punchOut;});
  return(<>
    <h2 className="page-title">ダッシュボード</h2>
    <p className="page-sub">{fmt(td)}</p>
    <div className="stats-row">
      <div className="stat-card"><div className="stat-label">今月の売上</div><div className="stat-value">{fmtYen(total)}</div><div className="stat-unit">{monthSales.length}件</div></div>
      <div className="stat-card"><div className="stat-label">本日の予約</div><div className="stat-value">{todayRes.length}</div><div className="stat-unit">件</div></div>
      <div className="stat-card"><div className="stat-label">お客様数</div><div className="stat-value">{clients.length}</div><div className="stat-unit">登録済み</div></div>
      <div className="stat-card"><div className="stat-label">出勤中</div><div className="stat-value">{clockedIn.length}</div><div className="stat-unit">名</div></div>
    </div>
    {clockedIn.length>0&&<div className="card"><div className="card-title">現在出勤中</div><div style={{display:'flex',gap:10,flexWrap:'wrap'}}>{clockedIn.map(s=>{const last=(timecards[s.id]||[]).filter(c=>c.date===td).slice(-1)[0];return(<div key={s.id} style={{background:'#EAF3EC',border:'1px solid #c0dfc9',borderRadius:8,padding:'10px 16px'}}><div style={{fontWeight:600,fontSize:14}}>{s.name}</div><div style={{fontSize:12,color:'#6B9E7A'}}>出勤 {last?.punchIn}</div></div>);})}</div></div>}
    {todayRes.length>0&&<div className="card"><div className="card-title">本日の予約</div><div className="table-wrap"><table><thead><tr><th>時間</th><th>お客様</th><th>メニュー</th><th>担当</th><th>状態</th></tr></thead><tbody>{todayRes.map(r=><tr key={r.id}><td style={{fontWeight:700,fontFamily:"'Cormorant Garamond',serif",fontSize:16}}>{r.time}</td><td>{r.clientName}</td><td>{r.menu||'—'}</td><td>{r.staffName||'—'}</td><td><span className={`badge ${r.status==='完了'?'badge-gray':'badge-green'}`}>{r.status}</span></td></tr>)}</tbody></table></div></div>}
    <div className="card"><div className="card-title">今月の売上グラフ</div><MiniChart sales={sales} month={month}/></div>
  </>);
}

function MiniChart({sales,month}){
  const days=Array.from({length:31},(_,i)=>{const d=String(i+1).padStart(2,'0');const total=sales.filter(s=>s.date===`${month}-${d}`).reduce((a,b)=>a+Number(b.amount),0);return{d:i+1,total};});
  const max=Math.max(...days.map(x=>x.total),1);
  return(<div style={{display:'flex',alignItems:'flex-end',gap:3,height:80}}>{days.map(({d,total})=><div key={d} title={`${d}日: ${fmtYen(total)}`} style={{flex:1,background:total>0?'#C4788A':'#E8E2DA',height:`${Math.max((total/max)*100,total>0?6:2)}%`,borderRadius:'3px 3px 0 0',minWidth:4}}/>)}</div>);
}

function Timecard({staff,setStaff,timecards,setTimecards,clock}){
  const [tab,setTab]=useState('punch');
  const [viewStaff,setViewStaff]=useState(staff[0]?.id||null);
  const [viewMonth,setViewMonth]=useState(todayStr().slice(0,7));
  const [modal,setModal]=useState(false);
  const [newStaff,setNewStaff]=useState({name:'',role:'',color:'#C4788A'});
  const COLORS=['#C4788A','#6B9E7A','#D4913A','#7A8EC4','#9B7AC4','#C47A6B'];
  const td=todayStr();

  const getStatus=staffId=>{const cards=(timecards[staffId]||[]).filter(c=>c.date===td);const last=cards[cards.length-1];if(!last)return'out';return last.punchIn&&!last.punchOut?'in':'out';};

  const punch=staffId=>{
    const now=nowStr(),status=getStatus(staffId);
    setTimecards(prev=>{
      const cards=[...(prev[staffId]||[])];
      if(status==='out'){cards.push({id:uid(),date:td,punchIn:now,punchOut:null});}
      else{const last=cards[cards.length-1];if(last&&!last.punchOut)last.punchOut=now;}
      return{...prev,[staffId]:cards};
    });
  };

  const calcHours=(punchIn,punchOut)=>{if(!punchIn||!punchOut)return null;const[h1,m1]=punchIn.split(':').map(Number);const[h2,m2]=punchOut.split(':').map(Number);const mins=(h2*60+m2)-(h1*60+m1);if(mins<=0)return null;return`${Math.floor(mins/60)}h${mins%60>0?String(mins%60).padStart(2,'0')+'m':''}`;};

  const monthCards=staffId=>(timecards[staffId]||[]).filter(c=>c.date.startsWith(viewMonth));

  const addStaff=()=>{if(!newStaff.name)return;setStaff(p=>[...p,{...newStaff,id:uid()}]);setModal(false);setNewStaff({name:'',role:'',color:'#C4788A'});};
  const delStaff=id=>{if(!confirm('このスタッフを削除しますか？'))return;setStaff(p=>p.filter(s=>s.id!==id));if(viewStaff===id)setViewStaff(null);};
  const [editModal,setEditModal]=useState(false);
  const [editStaff,setEditStaffData]=useState(null);
  const openEdit=s=>{setEditStaffData({...s});setEditModal(true);};
  const saveEdit=()=>{if(!editStaff.name)return;setStaff(p=>p.map(s=>s.id===editStaff.id?editStaff:s));setEditModal(false);};

  const clockDisplay=clock.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  return(<>
    <div className="header-row"><div><h2 className="page-title">タイムカード</h2><p className="page-sub">出勤・退勤の打刻と勤務時間管理</p></div><button className="btn btn-primary" onClick={()=>setModal(true)}>＋ スタッフ追加</button></div>
    <div className="tab-row"><button className={`tab ${tab==='punch'?'active':''}`} onClick={()=>setTab('punch')}>打刻</button><button className={`tab ${tab==='history'?'active':''}`} onClick={()=>setTab('history')}>履歴・集計</button></div>
    {tab==='punch'&&<>
      <div style={{textAlign:'center',marginBottom:28}}><div className="clock-display">{clockDisplay}</div><div style={{fontSize:13,color:'#7A726A',marginTop:4}}>{fmt(td)}</div></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:16}}>
        {staff.map(s=>{
          const status=getStatus(s.id);
          const todayCards=(timecards[s.id]||[]).filter(c=>c.date===td);
          const last=todayCards[todayCards.length-1];
          return(<div key={s.id} className="card" style={{padding:0,overflow:'hidden'}}>
            <div style={{padding:'14px 18px',borderBottom:'1px solid #E8E2DA',display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:s.color||'#C4788A'}}/>
              <div><div style={{fontWeight:600,fontSize:15}}>{s.name}</div><div style={{fontSize:11,color:'#7A726A'}}>{s.role||'スタッフ'}</div></div>
              <span className={`punch-status ${status==='in'?'status-in':'status-out'}`} style={{marginLeft:'auto'}}>{status==='in'?'出勤中':'退勤済'}</span>
            </div>
            <div style={{padding:'16px 18px'}}>
              {last&&<div style={{marginBottom:14,fontSize:13}}>
                {last.punchIn&&<div style={{color:'#6B9E7A'}}>▶ 出勤 <strong>{last.punchIn}</strong></div>}
                {last.punchOut&&<div style={{color:'#C4788A'}}>■ 退勤 <strong>{last.punchOut}</strong></div>}
                {last.punchIn&&last.punchOut&&<div style={{color:'#7A726A',marginTop:4}}>勤務時間: <strong>{calcHours(last.punchIn,last.punchOut)}</strong></div>}
              </div>}
              <button className={`punch-btn ${status==='out'?'punch-in':'punch-out'}`} onClick={()=>punch(s.id)}>{status==='out'?'▶ 出勤打刻':'■ 退勤打刻'}</button>
            </div>
          </div>);
        })}
      </div>
    </>}
    {tab==='history'&&<div style={{display:'flex',gap:20}}>
      <div style={{width:200,minWidth:200}}>
        <div className="card-title">スタッフ</div>
        {staff.map(s=><div key={s.id} style={{padding:'10px 14px',borderRadius:8,marginBottom:4,background:viewStaff===s.id?'#F5E6EA':'transparent',border:`1px solid ${viewStaff===s.id?'#C4788A':'#E8E2DA'}`}}>
          <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',marginBottom:6}} onClick={()=>setViewStaff(s.id)}>
            <div style={{width:8,height:8,borderRadius:'50%',background:s.color||'#C4788A',flexShrink:0}}/>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{s.name}</div><div style={{fontSize:11,color:'#7A726A'}}>{s.role||'スタッフ'}</div></div>
          </div>
          <div style={{display:'flex',gap:4}}>
            <button className="btn btn-ghost btn-sm" style={{flex:1,fontSize:11,padding:'4px 8px'}} onClick={e=>{e.stopPropagation();openEdit(s);}}>✏️ 編集</button>
            <button className="btn btn-danger btn-sm" style={{flex:1,fontSize:11,padding:'4px 8px'}} onClick={e=>{e.stopPropagation();delStaff(s.id);}}>削除</button>
          </div>
        </div>)}
      </div>
      <div style={{flex:1}}>
        <div style={{display:'flex',gap:12,marginBottom:20}}><input type="month" className="form-input" style={{width:160}} value={viewMonth} onChange={e=>setViewMonth(e.target.value)}/></div>
        {viewStaff&&(()=>{
          const cards=monthCards(viewStaff).sort((a,b)=>a.date.localeCompare(b.date));
          const totalMins=cards.reduce((acc,c)=>{if(!c.punchIn||!c.punchOut)return acc;const[h1,m1]=c.punchIn.split(':').map(Number);const[h2,m2]=c.punchOut.split(':').map(Number);return acc+Math.max(0,(h2*60+m2)-(h1*60+m1));},0);
          const completed=cards.filter(c=>c.punchIn&&c.punchOut);
          return(<>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:20}}>
              {[['出勤日数',`${completed.length}日`,'#6B9E7A'],['総勤務時間',`${Math.floor(totalMins/60)}h${totalMins%60>0?String(totalMins%60).padStart(2,'0')+'m':''}`,'#C4788A'],['平均勤務',completed.length?`${Math.floor(totalMins/completed.length/60)}h${Math.round((totalMins/completed.length)%60)}m`:'—','#D4913A']].map(([l,v,c])=><div key={l} className="stat-card" style={{padding:'14px 18px'}}><div className="stat-label">{l}</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:c,marginTop:4}}>{v}</div></div>)}
            </div>
            <div className="card" style={{padding:0}}><div className="table-wrap"><table><thead><tr><th>日付</th><th>出勤時間</th><th>退勤時間</th><th>勤務時間</th></tr></thead><tbody>
              {cards.length===0&&<tr><td colSpan={4} style={{textAlign:'center',color:'#B8AFA8',padding:32}}>記録がありません</td></tr>}
              {cards.map(c=><tr key={c.id}><td>{fmt(c.date)}</td><td><span className="badge badge-green">{c.punchIn||'—'}</span></td><td><span className={c.punchOut?'badge badge-rose':'badge badge-gray'}>{c.punchOut||'出勤中'}</span></td><td style={{fontWeight:600}}>{calcHours(c.punchIn,c.punchOut)||'—'}</td></tr>)}
            </tbody></table></div></div>
          </>);
        })()}
      </div>
    </div>}
    {modal&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}><div className="modal">
      <div className="modal-title">スタッフを追加</div>
      <div className="form-row cols2">
        <div className="form-group"><label className="form-label">名前 *</label><input className="form-input" placeholder="鈴木 あい" value={newStaff.name} onChange={e=>setNewStaff(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">役職</label><input className="form-input" placeholder="セラピスト" value={newStaff.role} onChange={e=>setNewStaff(p=>({...p,role:e.target.value}))}/></div>
      </div>
      <div className="form-group"><label className="form-label">カラー</label><div style={{display:'flex',gap:8,marginTop:4}}>{COLORS.map(c=><div key={c} onClick={()=>setNewStaff(p=>({...p,color:c}))} style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',border:newStaff.color===c?`3px solid #2C2825`:'3px solid transparent'}}/>)}</div></div>
      <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setModal(false)}>キャンセル</button><button className="btn btn-primary" onClick={addStaff}>追加する</button></div>
    </div></div>}
    {editModal&&editStaff&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditModal(false)}><div className="modal">
      <div className="modal-title">スタッフを編集</div>
      <div className="form-row cols2">
        <div className="form-group"><label className="form-label">名前 *</label><input className="form-input" value={editStaff.name} onChange={e=>setEditStaffData(p=>({...p,name:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">役職</label><input className="form-input" value={editStaff.role||''} onChange={e=>setEditStaffData(p=>({...p,role:e.target.value}))}/></div>
      </div>
      <div className="form-group"><label className="form-label">カラー</label><div style={{display:'flex',gap:8,marginTop:4}}>{COLORS.map(c=><div key={c} onClick={()=>setEditStaffData(p=>({...p,color:c}))} style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',border:editStaff.color===c?`3px solid #2C2825`:'3px solid transparent'}}/>)}</div></div>
      <div className="modal-actions"><button className="btn btn-danger" onClick={()=>{delStaff(editStaff.id);setEditModal(false);}}>削除する</button><button className="btn btn-ghost" onClick={()=>setEditModal(false)}>キャンセル</button><button className="btn btn-primary" onClick={saveEdit}>保存する</button></div>
    </div></div>}
  </>);
}

  const fileRef=useRef();

  const filtered=clients.filter(c=>c.name.includes(search)||(c.kana||'').includes(search)||(c.phone||'').includes(search));
  const clientData=selected?clients.find(c=>c.id===selected):null;

  const addClient=()=>{if(!form.name)return;const nc={...form,id:uid(),visits:[]};setClients(p=>[...p,nc]);setSelected(nc.id);setModal(false);setForm({name:'',kana:'',phone:'',birthday:'',allergies:'',note:''});};

        <div style={{fontSize:11,color:'#7A726A',marginBottom:8}}>{filtered.length}件</div>

          {filtered.map(c=><div key={c.id} className={`client-row ${selected===c.id?'selected':''}`} onClick={()=>setSelected(c.id)}><div><div style={{fontWeight:600,fontSize:14}}>{c.name}</div><div style={{fontSize:12,color:'#7A726A'}}>{c.kana&&`${c.kana}  `}{c.phone}</div><div style={{fontSize:11,color:'#B8AFA8',marginTop:2}}>{(c.visits||[]).length}回来店</div></div><span style={{color:'#B8AFA8'}}>›</span></div>)}
          {filtered.length===0&&<p style={{color:'#B8AFA8',fontSize:13,textAlign:'center',marginTop:24}}>見つかりません</p>}

      <div className="form-group" style={{marginBottom:16}}><label className="form-label">アレルギー・注意事項</label><input className="form-input" placeholder="敏感肌 など" value={form.allergies} onChange={e=>setForm(p=>({...p,allergies:e.target.value}))}/></div>
      <div className="form-group"><label className="form-label">お客様メモ</label><textarea className="form-textarea" placeholder="好み・カウンセリング内容など" value={form.note} onChange={e=>setForm(p=>({...p,note:e.target.value}))}/></div>
      <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setModal(false)}>キャンセル</button><button className="btn btn-primary" onClick={addClient}>登録する</button></div>
    </div></div>}
    {visitModal&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setVisitModal(false)}><div className="modal">
      <div className="modal-title">来店記録を追加</div>
      <div className="form-row cols2"><div className="form-group"><label className="form-label">来店日 *</label><input type="date" className="form-input" value={visitForm.date} onChange={e=>setVisitForm(p=>({...p,date:e.target.value}))}/></div><div className="form-group"><label className="form-label">担当</label><select className="form-select" value={visitForm.staffName} onChange={e=>setVisitForm(p=>({...p,staffName:e.target.value}))}><option value="">選択</option>{staff.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}</select></div></div>

      <div className="form-group" style={{marginBottom:16}}><label className="form-label">施術メモ</label><textarea className="form-textarea" placeholder="使用薬剤・施術内容など" value={visitForm.memo} onChange={e=>setVisitForm(p=>({...p,memo:e.target.value}))}/></div>

      <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setVisitModal(false)}>キャンセル</button><button className="btn btn-primary" onClick={addVisit}>記録する</button></div>
    </div></div>}
  </>);
}

function Reservations({reservations,setReservations,sales,setSales,clients,staff}){
  const [modal,setModal]=useState(false);
  const [completeModal,setCompleteModal]=useState(null);
  const [filterDate,setFilterDate]=useState(todayStr());
  const [form,setForm]=useState({date:todayStr(),time:'10:00',clientName:'',phone:'',menus:[],menu:'',staffName:'',duration:'60',memo:'',status:'確定',price:''});
  const [completeForm,setCompleteForm]=useState({price:'',payment:'現金',memo:''});

  const filtered=reservations.filter(r=>r.date===filterDate).sort((a,b)=>a.time.localeCompare(b.time));
  const add=()=>{if(!form.date||!form.clientName)return;const menuStr=(form.menus||[]).join('・')||form.menu||'';setReservations(p=>[...p,{...form,id:uid(),menu:menuStr}]);setModal(false);setForm({date:todayStr(),time:'10:00',clientName:'',phone:'',menus:[],menu:'',staffName:'',duration:'60',memo:'',status:'確定',price:''});};
  const openComplete=r=>{setCompleteForm({price:r.price||'',payment:'現金',memo:''});setCompleteModal(r);};
  const confirmComplete=()=>{const r=completeModal;setReservations(p=>p.map(x=>x.id===r.id?{...x,status:'完了'}:x));setSales(p=>[{id:uid(),date:r.date,clientName:r.clientName,menu:r.menu,staffName:r.staffName,amount:Number(completeForm.price)||0,payment:completeForm.payment,memo:completeForm.memo},...p]);setCompleteModal(null);};
  const STATUS_STYLE={'確定':'badge-green','完了':'badge-gray','キャンセル':'badge-red'};

  return(<>
    <div className="header-row"><div><h2 className="page-title">予約管理</h2><p className="page-sub">完了ボタンで売上に自動反映されます</p></div><button className="btn btn-primary" onClick={()=>setModal(true)}>＋ 予約を追加</button></div>
    <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'center'}}>
      <input type="date" className="form-input" style={{width:180}} value={filterDate} onChange={e=>setFilterDate(e.target.value)}/>
      <span style={{fontSize:13,color:'#7A726A'}}>{filtered.length}件</span>
      <span style={{fontSize:13,color:'#6B9E7A',fontWeight:600}}>完了: {filtered.filter(r=>r.status==='完了').length}件 / 確定: {filtered.filter(r=>r.status==='確定').length}件</span>
    </div>
    <div className="card" style={{padding:0}}><div className="table-wrap"><table><thead><tr><th>時間</th><th>お客様</th><th>電話</th><th>メニュー</th><th>担当</th><th>状態</th><th>操作</th></tr></thead><tbody>
      {filtered.length===0&&<tr><td colSpan={7} style={{textAlign:'center',color:'#B8AFA8',padding:32}}>この日の予約はありません</td></tr>}
      {filtered.map(r=><tr key={r.id}>
        <td style={{fontWeight:700,fontFamily:"'Cormorant Garamond',serif",fontSize:16}}>{r.time}</td>
        <td style={{fontWeight:500}}>{r.clientName}</td>
        <td style={{color:'#7A726A',fontSize:12}}>{r.phone||'—'}</td>
        <td>{r.menu||'—'}</td><td>{r.staffName||'—'}</td>
        <td><span className={`badge ${STATUS_STYLE[r.status]||'badge-gray'}`}>{r.status}</span></td>
        <td><div style={{display:'flex',gap:6}}>
          {r.status==='確定'&&<button className="btn btn-green btn-sm" onClick={()=>openComplete(r)}>完了→売上</button>}
          {r.status==='確定'&&<button className="btn btn-danger btn-sm" onClick={()=>setReservations(p=>p.map(x=>x.id===r.id?{...x,status:'キャンセル'}:x))}>ｷｬﾝｾﾙ</button>}
          <button className="btn btn-danger btn-sm" onClick={()=>setReservations(p=>p.filter(x=>x.id!==r.id))}>削除</button>
        </div></td>
      </tr>)}
    </tbody></table></div></div>
    {modal&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}><div className="modal">
      <div className="modal-title">予約を追加</div>
      <div className="form-row cols2"><div className="form-group"><label className="form-label">日付 *</label><input type="date" className="form-input" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div><div className="form-group"><label className="form-label">時間</label><input type="time" className="form-input" value={form.time} onChange={e=>setForm(p=>({...p,time:e.target.value}))}/></div></div>
      <div className="form-row cols2"><div className="form-group"><label className="form-label">お客様名 *</label><input className="form-input" placeholder="山田 花子" value={form.clientName} onChange={e=>setForm(p=>({...p,clientName:e.target.value}))} list="cl-res"/><datalist id="cl-res">{clients.map(c=><option key={c.id} value={c.name}/>)}</datalist></div><div className="form-group"><label className="form-label">電話番号</label><input className="form-input" placeholder="090-0000-0000" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))}/></div></div>
      <div className="form-row cols3"><div className="form-group"><label className="form-label">メニュー（複数選択可）</label><div style={{border:'1px solid #E8E2DA',borderRadius:8,padding:'8px 12px',background:'#FAF8F5',maxHeight:160,overflowY:'auto'}}>{MENUS.map(m=><label key={m} style={{display:'flex',alignItems:'center',gap:8,padding:'3px 0',cursor:'pointer',fontSize:12}}><input type="checkbox" checked={(form.menus||[]).includes(m)} onChange={e=>{const cur=form.menus||[];const newMenus=e.target.checked?[...cur,m]:cur.filter(x=>x!==m);const total=newMenus.reduce((a,mn)=>a+(MENU_PRICES[mn]||0),0);setForm(p=>({...p,menus:newMenus,menu:newMenus.join('・'),price:total>0?String(total):''}));}} style={{accentColor:'#C4788A'}}/>{m}</label>)}</div></div><div className="form-group"><label className="form-label">担当</label><select className="form-select" value={form.staffName} onChange={e=>setForm(p=>({...p,staffName:e.target.value}))}><option value="">選択</option>{staff.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}</select></div><div className="form-group"><label className="form-label">施術時間</label><select className="form-select" value={form.duration} onChange={e=>setForm(p=>({...p,duration:e.target.value}))}>{[30,45,60,90,120,150,180].map(d=><option key={d} value={d}>{d}分</option>)}</select></div></div>
      <div className="form-row cols2"><div className="form-group"><label className="form-label">目安金額</label><input type="number" className="form-input" placeholder="8000" value={form.price} onChange={e=>setForm(p=>({...p,price:e.target.value}))}/></div><div className="form-group"><label className="form-label">メモ</label><input className="form-input" placeholder="ご要望など" value={form.memo} onChange={e=>setForm(p=>({...p,memo:e.target.value}))}/></div></div>
      <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setModal(false)}>キャンセル</button><button className="btn btn-primary" onClick={add}>追加する</button></div>
    </div></div>}
    {completeModal&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setCompleteModal(null)}><div className="modal">
      <div className="modal-title">施術完了・売上に追加</div>
      <div className="res-complete-box"><strong>{completeModal.clientName}</strong> さん · {completeModal.menu} · {completeModal.staffName}<br/>{completeModal.time} ～</div>
      <div style={{height:20}}/>
      <div className="form-row cols2"><div className="form-group"><label className="form-label">金額（円）*</label><input type="number" className="form-input" placeholder="8000" value={completeForm.price} onChange={e=>setCompleteForm(p=>({...p,price:e.target.value}))}/></div><div className="form-group"><label className="form-label">支払方法</label><select className="form-select" value={completeForm.payment} onChange={e=>setCompleteForm(p=>({...p,payment:e.target.value}))}>{PAYMENT.map(m=><option key={m} value={m}>{m}</option>)}</select></div></div>
      <div className="form-group"><label className="form-label">メモ</label><input className="form-input" placeholder="備考" value={completeForm.memo} onChange={e=>setCompleteForm(p=>({...p,memo:e.target.value}))}/></div>
      <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setCompleteModal(null)}>キャンセル</button><button className="btn btn-primary" onClick={confirmComplete}>完了・売上に追加する</button></div>
    </div></div>}
  </>);
}

function Sales({sales,setSales,clients,staff}){
  const [modal,setModal]=useState(false);
  const [filterMonth,setFilterMonth]=useState(todayStr().slice(0,7));
  const [form,setForm]=useState({date:todayStr(),clientName:'',menus:[],menu:'',amount:'',payment:'現金',staffName:'',memo:''});
  const filtered=sales.filter(s=>s.date.startsWith(filterMonth)).sort((a,b)=>b.date.localeCompare(a.date));
  const total=filtered.reduce((a,b)=>a+Number(b.amount),0);
  const add=()=>{if(!form.date||!form.amount)return;const menuStr=(form.menus||[]).join('・')||form.menu||'';setSales(p=>[{...form,id:uid(),amount:Number(form.amount),menu:menuStr},...p]);setModal(false);setForm({date:todayStr(),clientName:'',menus:[],menu:'',amount:'',payment:'現金',staffName:'',memo:''});};

  const today=new Date();
  const day=today.getDate();
  const reportType=day<=10?'中間報告①（10日）':day<=20?'中間報告②（20日）':'最終報告（月末）';

  const downloadReport=()=>{
    const [y,m]=filterMonth.split('-').map(Number);
    const monthLabel=`${y}年${m}月`;
    const wb=XLSX.utils.book_new();

    // シート1: 全売上実績
    const s1=[
      [`${monthLabel} 売上レポート　${reportType}`,'','','','',''],
      ['作成日',new Date().toLocaleDateString('ja-JP'),'','','',''],
      [''],
      ['日付','お客様','メニュー','担当','支払方法','金額'],
      ...filtered.map(s=>[s.date,s.clientName||'—',s.menu||'—',s.staffName||'—',s.payment,Number(s.amount)]),
      [''],
      ['合計','','','','',total],
      ['件数',filtered.length,'','','',''],
    ];
    const ws1=XLSX.utils.aoa_to_sheet(s1);
    ws1['!cols']=[{wch:12},{wch:14},{wch:16},{wch:12},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws1,'全売上実績');

    // シート2: スタッフ別売上
    const staffMap={};
    filtered.forEach(s=>{
      const name=s.staffName||'未設定';
      if(!staffMap[name])staffMap[name]={count:0,total:0};
      staffMap[name].count++;
      staffMap[name].total+=Number(s.amount);
    });
    const s2=[
      [`${monthLabel} スタッフ別売上　${reportType}`,'',''],
      [''],
      ['スタッフ名','件数','売上合計'],
      ...Object.entries(staffMap).sort((a,b)=>b[1].total-a[1].total).map(([name,v])=>[name,v.count,v.total]),
      [''],
      ['合計',filtered.length,total],
    ];
    const ws2=XLSX.utils.aoa_to_sheet(s2);
    ws2['!cols']=[{wch:16},{wch:8},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws2,'スタッフ別売上');

    // シート3: コース別売上
    const menuMap={};
    filtered.forEach(s=>{
      const menu=s.menu||'未設定';
      if(!menuMap[menu])menuMap[menu]={count:0,total:0};
      menuMap[menu].count++;
      menuMap[menu].total+=Number(s.amount);
    });
    const s3=[
      [`${monthLabel} コース別売上　${reportType}`,'',''],
      [''],
      ['コース名','件数','売上合計'],
      ...Object.entries(menuMap).sort((a,b)=>b[1].total-a[1].total).map(([menu,v])=>[menu,v.count,v.total]),
      [''],
      ['合計',filtered.length,total],
    ];
    const ws3=XLSX.utils.aoa_to_sheet(s3);
    ws3['!cols']=[{wch:20},{wch:8},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws3,'コース別売上');

    XLSX.writeFile(wb,`売上レポート_${monthLabel}_${reportType.split('（')[0]}.xlsx`);
  };

  return(<>
    <div className="header-row"><div><h2 className="page-title">売上・収入</h2><p className="page-sub">予約完了時に自動追加、手動入力も可能です</p></div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-amber" onClick={downloadReport} style={{background:'#FBF0E0',color:'#D4913A',border:'1px solid #e8cfa0'}}>📊 Excelレポート作成</button>
        <button className="btn btn-primary" onClick={()=>setModal(true)}>＋ 手動追加</button>
      </div>
    </div>
    <div style={{background:'#FBF0E0',border:'1px solid #e8cfa0',borderRadius:8,padding:'10px 16px',marginBottom:16,fontSize:13,color:'#7a5a20'}}>
      📋 本日は <strong>{reportType}</strong> の対象日です。Excelレポートをダウンロードして提出してください。
    </div>
    <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'center'}}>
      <input type="month" className="form-input" style={{width:160}} value={filterMonth} onChange={e=>setFilterMonth(e.target.value)}/>
      <div className="stat-card" style={{margin:0,padding:'12px 20px',display:'flex',gap:20,alignItems:'center'}}>
        <div><div className="stat-label">合計</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:500,color:'#C4788A'}}>{fmtYen(total)}</div></div>
        <div style={{width:1,background:'#E8E2DA',alignSelf:'stretch'}}/>
        <div><div className="stat-label">件数</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26}}>{filtered.length}</div></div>
      </div>
    </div>
    <div className="card" style={{padding:0}}><div className="table-wrap"><table><thead><tr><th>日付</th><th>お客様</th><th>メニュー</th><th>担当</th><th>支払</th><th>金額</th><th></th></tr></thead><tbody>
      {filtered.length===0&&<tr><td colSpan={7} style={{textAlign:'center',color:'#B8AFA8',padding:32}}>この月の売上データがありません</td></tr>}
      {filtered.map(s=><tr key={s.id}><td>{s.date}</td><td>{s.clientName||'—'}</td><td>{s.menu||'—'}</td><td>{s.staffName||'—'}</td><td><span className="badge badge-gray">{s.payment}</span></td><td style={{fontWeight:600,color:'#C4788A'}}>{fmtYen(s.amount)}</td><td><button className="btn btn-danger btn-sm" onClick={()=>setSales(p=>p.filter(x=>x.id!==s.id))}>削除</button></td></tr>)}
    </tbody></table></div></div>
    {modal&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}><div className="modal">
      <div className="modal-title">売上を手動追加</div>
      <div className="form-row cols2"><div className="form-group"><label className="form-label">日付</label><input type="date" className="form-input" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div><div className="form-group"><label className="form-label">金額（円）*</label><input type="number" className="form-input" placeholder="8000" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/></div></div>
      <div className="form-row cols2"><div className="form-group"><label className="form-label">お客様名</label><input className="form-input" placeholder="山田 花子" value={form.clientName} onChange={e=>setForm(p=>({...p,clientName:e.target.value}))} list="cl-s"/><datalist id="cl-s">{clients.map(c=><option key={c.id} value={c.name}/>)}</datalist></div><div className="form-group"><label className="form-label">担当</label><select className="form-select" value={form.staffName} onChange={e=>setForm(p=>({...p,staffName:e.target.value}))}><option value="">選択</option>{staff.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}</select></div></div>
      <div className="form-group" style={{marginBottom:16}}>
        <label className="form-label">メニュー（複数選択可）</label>
        <div style={{border:'1px solid #E8E2DA',borderRadius:8,padding:'10px 12px',background:'#FAF8F5',maxHeight:200,overflowY:'auto'}}>
          {MENUS.map(m=><label key={m} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',cursor:'pointer',fontSize:13}}>
            <input type="checkbox" checked={(form.menus||[]).includes(m)} onChange={e=>{const cur=form.menus||[];const newMenus=e.target.checked?[...cur,m]:cur.filter(x=>x!==m);const total=newMenus.reduce((a,mn)=>a+(MENU_PRICES[mn]||0),0);setForm(p=>({...p,menus:newMenus,amount:total>0?String(total):''}));}} style={{accentColor:'#C4788A',width:16,height:16}}/>
            {m}
          </label>)}
        </div>
      </div>
      <div className="form-row cols2"><div className="form-group"><label className="form-label">支払方法</label><select className="form-select" value={form.payment} onChange={e=>setForm(p=>({...p,payment:e.target.value}))}>{PAYMENT.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
      <div className="form-group"><label className="form-label">メモ</label><input className="form-input" placeholder="備考" value={form.memo} onChange={e=>setForm(p=>({...p,memo:e.target.value}))}/></div></div>
      <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setModal(false)}>キャンセル</button><button className="btn btn-primary" onClick={add}>追加する</button></div>
    </div></div>}
  </>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
